name: Update Claude Code

on:
  schedule:
    - cron: "0 0 * * *" # 毎日 UTC 0:00（JST 9:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check for update
        id: check
        run: |
          CURRENT=$(grep 'version = ' overlays/claude-code.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          LATEST=$(curl -sS https://registry.npmjs.org/@anthropic-ai/claude-code/latest | jq -r .version)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update claude-code
        if: steps.check.outputs.update == 'true'
        run: bash scripts/update-claude-code.sh

      - name: Commit and push
        if: steps.check.outputs.update == 'true'
        env:
          LATEST_VERSION: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add overlays/claude-code.nix overlays/claude-code-package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "claude-code ${LATEST_VERSION} に更新"
          git push
